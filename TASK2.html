<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="stylesheet.css">
  <title>ShopEase</title>
</head>
<body>

<header>
  <h1>ShopEase</h1>
  <nav aria-label="Main Navigation">
    <ul>
      <li><a href="TASK1.html">Home</a></li>
      <li><a href="TASK2.html">Products</a></li>
      <li><a href="TASK4.html">Cart</a></li>
      <li><a href="TASK5.html">Checkout</a></li>
    </ul>
  </nav>
</header>

<main>
  <aside>
    <h2>Filters</h2>
    <form>
      <fieldset>
        <legend>Category</legend>
        <label><input type="checkbox" name="category" value="electronics"> Electronics</label><br>
        <label><input type="checkbox" name="category" value="clothing"> Clothing</label>
      </fieldset>

      <fieldset>
        <legend>Price Range</legend>
        <label><input type="radio" name="price" value="low"> Under $100</label><br>
        <label><input type="radio" name="price" value="high"> Over $100</label>
      </fieldset>
    </form>
  </aside>

  <section aria-labelledby="product-grid" class="products-section">
    <h2 id="product-grid">Available Products</h2>
    <div class="products-grid">
      <article>
        <img src="C:\Users\admin\OneDrive\Pictures\Screenshots\1.avif" alt="Gold Necklace">
        <h3>Gold Necklace</h3>
        <p>Php9,999</p>
        <a href="detailnecklace.html" role="button">View Details</a>
      <a href="TASK3.html?item=necklace" role="button" class="add-cart">Add to Cart</a>
      </article>

      <article>
        <img src="C:\Users\admin\OneDrive\Pictures\Screenshots\2.avif" alt="Silver Bracelet">
        <h3>Silver Bracelet</h3>
        <p>Php5,000</p>
        <a href="detailbracelet.html" role="button">View Details</a>
      <a href="TASK3.html?item=bracelet" role="button" class="add-cart">Add to Cart</a>
      </article>
    </div>
  </section>

</main>

<div class="back-button-container">
  <a href="TASK1.html" role="button" class="back-button">Back</a>
</div>

</body>
</html>

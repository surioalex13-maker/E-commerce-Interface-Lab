<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Products - ShopEase</title>
</head>
<body>

<header>
  <h1>Products</h1>
</header>

<main>

  <section aria-labelledby="product-grid">
    <h2 id="product-grid">Available Products</h2>

    <article>
      <img src="C:\Users\admin\OneDrive\Pictures\Screenshots\1.avif" alt="Gold Necklace" width="70">
      <h3>Gold Necklace</h3>
      <p>$9,999</p>
      <a href="detailnecklace.html">View Details</a>

    <article>
      <img src="C:\Users\admin\OneDrive\Pictures\Screenshots\2.avif" alt="Silver Bracelet" width="70">

        <label><input type="radio" name="price" value="high"> Over $100</label>
      </fieldset>
    </form>
  </aside>

</main>

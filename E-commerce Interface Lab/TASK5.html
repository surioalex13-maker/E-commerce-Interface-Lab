<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="stylesheet.css">
  <title>ShopEase - Checkout</title>
</head>
<body data-page="checkout">
  <header>
    <h1>ShopEase</h1>
    <nav aria-label="Main Navigation">
      <ul>
        <li><a href="TASK1.html">Home</a></li>
        <li><a href="TASK2.html">Products</a></li>
        <li><a href="TASK4.html">Cart</a></li>
        <li><a href="TASK5.html">Checkout</a></li>
        <li><a href="TASK6.html">Orders</a></li>
      </ul>
    </nav>
  </header>

  <main class="checkout-container">
    <div>
      <h1>Checkout</h1>

      <section>
        <h2>Shipping Information</h2>
        <form id="checkout-form">
          <fieldset>
            <legend>Shipping Address</legend>

            <label for="fullname">Full Name</label>
            <input type="text" id="fullname" name="fullname" required>

            <label for="street">Street Address</label>
            <input type="text" id="street" name="street" required>

            <label for="city">City</label>
            <input type="text" id="city" name="city" required>

            <label for="zip">ZIP Code</label>
            <input type="text" id="zip" name="zip" pattern="[0-9]{4,5}" required>
          </fieldset>

          <fieldset>
            <legend>Payment Method</legend>
            <label><input type="radio" name="payment" value="Credit Card" required> Credit Card</label>
            <label><input type="radio" name="payment" value="PayPal"> PayPal</label>
            <label><input type="radio" name="payment" value="Cash on Delivery"> Cash on Delivery</label>
          </fieldset>

          <button type="submit" id="place-order">Place Order</button>
          <p class="status-message" id="checkout-message" aria-live="polite"></p>
        </form>
      </section>
    </div>

    <aside>
      <h2>Order Summary</h2>
      <div id="checkout-summary"></div>
    </aside>
  </main>

  <div class="back-button-container">
    <a href="TASK4.html" role="button" class="back-button">Back</a>
  </div>

  <script src="app.js" defer></script>
</body>
</html>

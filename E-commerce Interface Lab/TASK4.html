<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="stylesheet.css">
  <title>ShopEase - Your Cart</title>
</head>
<body data-page="cart">
  <header>
    <h1>ShopEase</h1>
    <nav aria-label="Main Navigation">
      <ul>
        <li><a href="TASK1.html">Home</a></li>
        <li><a href="TASK2.html">Products</a></li>
        <li><a href="TASK4.html">Cart</a></li>
        <li><a href="TASK5.html">Checkout</a></li>
        <li><a href="TASK6.html">Orders</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <h1>Shopping Cart</h1>

    <section aria-live="polite">
      <p id="cart-status"></p>
    </section>

    <ul class="cart-items" id="cart-items"></ul>

    <section class="summary-card">
      <h2>Order Summary</h2>
      <p><span>Subtotal</span><strong id="cart-subtotal"></strong></p>
      <p><span>Total Items</span><strong id="cart-count"></strong></p>
      <div class="product-actions">
        <a href="TASK5.html" role="button" id="checkout-link">Proceed to Checkout</a>
        <button type="button" class="danger-button" id="clear-cart">Clear Cart</button>
      </div>
    </section>
  </main>

  <div class="back-button-container">
    <a href="TASK2.html" role="button" class="back-button">Back</a>
  </div>

  <script src="app.js" defer></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="stylesheet.css">
  <title>ShopEase - Product Details</title>
</head>
<body data-page="details">
  <header>
    <h1>ShopEase</h1>
    <nav aria-label="Main Navigation">
      <ul>
        <li><a href="TASK1.html">Home</a></li>
        <li><a href="TASK2.html">Products</a></li>
        <li><a href="TASK4.html">Cart</a></li>
        <li><a href="TASK5.html">Checkout</a></li>
        <li><a href="TASK6.html">Orders</a></li>
        <li><a href="TASK7.html">Login</a></li>
      </ul>
    </nav>
  </header>

  <main class="detail-layout">
    <section class="detail-media" aria-label="Product image">
      <img id="detail-image" alt="">
    </section>

    <section class="detail-summary" aria-labelledby="detail-title">
      <h1 id="detail-title"></h1>
      <p id="detail-tagline" class="page-intro"></p>
      <p id="detail-price" class="product-price"></p>
      <p id="detail-description"></p>

      <form id="purchase-form" class="purchase-panel">
        <label for="quantity">Quantity</label>
        <input type="number" id="quantity" name="quantity" min="1" value="1" required>
        <button type="submit">Add to Cart</button>
        <p id="purchase-message" class="status-message" aria-live="polite"></p>
      </form>
    </section>

    <section aria-labelledby="spec-heading">
      <h2 id="spec-heading">Specifications</h2>
      <div class="table-responsive">
        <table>
          <tbody id="spec-table"></tbody>
        </table>
      </div>
    </section>

    <section aria-labelledby="review-heading">
      <h2 id="review-heading">Customer Reviews</h2>
      <div id="review-list"></div>
    </section>
  </main>

  <div class="back-button-container">
    <a href="TASK2.html" role="button" class="back-button">Back</a>
  </div>

  <script src="app.js" defer></script>
</body>
</html>

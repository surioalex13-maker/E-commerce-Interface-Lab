<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="stylesheet.css">
  <title>ShopEase - Products</title>
</head>
<body data-page="products">
  <header>
    <h1>ShopEase</h1>
    <nav aria-label="Main Navigation">
      <ul>
        <li><a href="TASK1.html">Home</a></li>
        <li><a href="TASK2.html">Products</a></li>
        <li><a href="TASK4.html">Cart</a></li>
        <li><a href="TASK5.html">Checkout</a></li>
        <li><a href="TASK6.html">Orders</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <aside>
      <h2>Filters</h2>
      <form id="filter-form">
        <fieldset>
          <legend>Category</legend>
          <label><input type="checkbox" name="category" value="necklace"> Necklace</label>
          <label><input type="checkbox" name="category" value="bracelet"> Bracelet</label>
        </fieldset>

        <fieldset>
          <legend>Price Range</legend>
          <label><input type="radio" name="price" value="all" checked> All Prices</label>
          <label><input type="radio" name="price" value="under-7000"> Up to Php7,000</label>
          <label><input type="radio" name="price" value="over-7000"> Over Php7,000</label>
        </fieldset>

        <label for="search-input">Search</label>
        <input id="search-input" name="search" type="text" placeholder="Search products">
      </form>
    </aside>

    <section aria-labelledby="product-grid" class="products-section">
      <h2 id="product-grid">Available Products</h2>
      <p class="filter-summary" id="filter-summary" aria-live="polite"></p>
      <div class="products-grid" id="catalog-grid"></div>
    </section>
  </main>

  <div class="back-button-container">
    <a href="TASK1.html" role="button" class="back-button">Back</a>
  </div>

  <script src="app.js" defer></script>
</body>
</html>

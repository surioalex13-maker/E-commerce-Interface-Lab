<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Product Details</title>
</head>
<body>

<main>

  <article>
    <h1>Gold Necklace</h1>
    <img src="C:\Users\admin\OneDrive\Pictures\Screenshots\1.avif" alt="Gold Necklace" width="70">
    <p>$9,999</p>
  </article>

  <section>
    <h2>Technical Specifications</h2>
    <table>
      <caption>Product Specifications</caption>
      <tr>
        <th scope="row">karat(K)</th>
        <td>18K = 75% gold</td>
      </tr>
      <tr>
        <th scope="row">Gold Content</th>
        <td>91.6%</td>
      </tr>
      <tr>
        <th scope="row">Color Tone</th>
        <td>Yellow Gold</td>
      </tr>
    </table>
  </section>

  <section>
    <h2>Purchase</h2>
    <form>
      <label for="quantity">Quantity:</label>
      <input type="number" id="quantity" name="quantity" min="1" value="1">
      <button type="submit">Add to Cart</button>
    </form>
  </section>

  <section>
    <h2>User Reviews</h2>

    <article>
      <h3>Alex S.</h3>
      <blockquote>
        Great product!
      </blockquote>
    </article>

    <article>
      <h3>Lyza C.</h3>
      <blockquote>
        Excellent value for the price.
      </blockquote>
    </article>

  </section>

</main>

</body>
</html>
